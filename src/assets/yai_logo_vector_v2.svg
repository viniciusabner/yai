<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Navy Bubble -->
  <path 
    d="M50 5 C75 5 95 25 95 50 C95 75 75 95 50 95 C41 95 31 92 23 86 L10 93 L18 78 C10 70 5 60 5 50 C5 25 25 5 50 5 Z" 
    fill="#001F3F" 
    stroke="white" 
    stroke-width="5" 
    stroke-linejoin="round"
  />

  <!-- Text Group: Thinner & Boxier -->
  <!-- Centered -->
  <!-- Stroke width reduced to 7. Linecap 'square' for "quadriculado" look -->
  <g stroke="#FFD700" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Y -->
    <path d="M28 36 L37 50 V64" fill="none" />
    <path d="M46 36 L37 50" fill="none" />

    <!-- a: Geometric but with straighter feel -->
    <path d="M68 48 V64" />
    <!-- Circle part -->
    <path d="M68 56 C68 61 64 64 59 64 C54 64 50 61 50 56 C50 51 54 48 59 48 C64 48 68 51 68 56 Z" stroke-linecap="round" fill="none" />

    <!-- i -->
    <path d="M82 48 V64" />
  </g>

  <!-- i Dot (Square/Circle? Keeping circle but small for now, user didn't specify square dot, just letters) -->
  <circle cx="82" cy="35" r="5" fill="#FFD700" />

  <!-- Smile: Smaller, Centered, Curvier -->
  <!-- Start/End tighter (38/62 instead of 30/82) -->
  <!-- Deep Curve (Q 50 88) -->
  <path 
    d="M38 74 Q 50 88 62 74" 
    stroke="#FFD700" 
    stroke-width="6" 
    stroke-linecap="round" 
    fill="none"
  />
</svg>
