    <!-- a: Geometric -->
    <path d="M68 49 C68 45 65 42 60 42 C55 42 51 45 51 53 C51 59 55 63 60 63 C64 63 67 61 68 58 V64 V48" fill="none" />

    <!-- i: Simple -->
    <path d="M82 48 V64" />
